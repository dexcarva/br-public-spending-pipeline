# Pipeline INCREMENTAL na nuvem, de graça — a versão adulta deste workflow.
#
# HISTÓRIA em três atos (cada um ensinou uma coisa):
#   1. v1: cron semanal recarregando a janela INTEIRA de 3 meses num job de
#      GitHub Actions -> o volume real da API estourou o tempo (uma janela de
#      14 dias trouxe ~12.000 convênios em 48min; a API pagina de 15 em 15).
#   2. A ingestão pesada migrou pra stack Docker/Airflow local (sem limite de
#      tempo) — que continua existindo como laboratório completo pra quem
#      forka (docker-compose.yml).
#   3. v2 (esta): o desenho virou INCREMENTAL — cada execução processa só a
#      janela de 1 dia, em minutos, e o histórico acumula num Postgres
#      GERENCIADO GRATUITO (Neon), não no runner (que é descartável) nem no
#      repositório (que incharia). O runner volta a ser suficiente, porque o
#      trabalho diário encolheu de horas pra minutos: quem não coube na
#      nuvem foi o DESENHO antigo, não o pipeline.
#
# Fluxo (os mesmos passos da DAG local do Airflow, no mesmo código):
#   1. ingestão da janela   (ingestion/extract_convenios.py, 1 dia por padrão)
#   2. carga incremental    (scripts/carregar_raw_postgres.py -> Neon)
#   3. dbt run + test       (transform/, target "postgres" -> Neon)
#   4. publicação           (scripts/publicar_site.py -> docs/data/*.json)
#   5. commit dos JSON      (o GitHub Pages republica o site sozinho)
#
# SEGREDOS NECESSÁRIOS (Settings -> Secrets and variables -> Actions):
#   PORTAL_TRANSPARENCIA_API_KEY  (já existia)
#   POSTGRES_HOST / POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
#     -> a connection string do projeto no Neon (https://neon.tech, free
#        tier), separada em partes. MESMOS nomes de variável que o
#        docker-compose usa: o código não sabe em qual mundo está.

name: Atualizar dados de convênios

on:
  schedule:
    # Diário às 06:17 UTC (03:17 em Brasília). O minuto "quebrado" (17, não
    # 00) é de propósito: milhares de workflows disputam as horas cheias no
    # GitHub, e horário fora de hora pega menos fila. Ativado em 2026-07-19,
    # junto com o cadastro dos secrets do Neon no repositório.
    - cron: "17 6 * * *"
  workflow_dispatch:
    # Disparo manual COM janela opcional = mecanismo de BACKFILL: pra
    # carregar um período histórico, dispare informando as datas (a carga
    # delete-insert marca a janela inteira e é idempotente — repetir o mesmo
    # período não duplica nada). Sem inputs, processa ontem — igual ao cron.
    inputs:
      data_inicial:
        description: "Início da janela (DD/MM/AAAA) — vazio = ontem"
        required: false
        default: ""
      data_final:
        description: "Fim da janela (DD/MM/AAAA) — vazio = ontem"
        required: false
        default: ""

concurrency:
  # Duas execuções simultâneas fariam delete-insert nas mesmas tabelas do
  # Neon — a segunda espera a primeira em vez de colidir.
  group: atualizar-dados
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest
    # Janela de 1 dia = minutos de execução. 30 é folga generosa (e um
    # alarme: se estourar, algo está muito errado — não subir o timeout,
    # investigar).
    timeout-minutes: 30
    env:
      # Conexão com o Postgres gerenciado (Neon) — usada pela carga, pelo
      # dbt (profiles.yml lê env vars) e pela publicação.
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_PORT: "5432"
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Calcular a janela do dia (ou usar a informada no disparo manual)
        id: janela
        run: |
          # Sem inputs (cron ou dispatch vazio): janela ROLANTE dos últimos 7
          # dias até ontem — mesma decisão da DAG local, pelo mesmo motivo
          # medido na prática: o filtro de data da fonte enxerga um carimbo
          # de "última atualização" que ela re-carimba em lote, então o dado
          # "mora" sempre perto do último reprocessamento; janelas fixas de
          # 1 dia se esvaziam e perderiam quase tudo. A sobreposição entre
          # execuções consecutivas é inofensiva: a carga é delete-insert por
          # janela e o staging deduplica por id.
          INICIAL="${{ inputs.data_inicial }}"
          FINAL="${{ inputs.data_final }}"
          if [ -z "$INICIAL" ] || [ -z "$FINAL" ]; then
            INICIAL=$(date -u -d "7 days ago" +%d/%m/%Y)
            FINAL=$(date -u -d "yesterday" +%d/%m/%Y)
          fi
          # O carregador marca a janela no banco em formato ISO — convertemos
          # aqui, uma vez, em vez de cada script adivinhar formatos.
          echo "inicial=$INICIAL" >> "$GITHUB_OUTPUT"
          echo "final=$FINAL" >> "$GITHUB_OUTPUT"
          echo "inicial_iso=$(date -u -d "$(echo $INICIAL | awk -F/ '{print $3"-"$2"-"$1}')" +%F)" >> "$GITHUB_OUTPUT"
          echo "final_iso=$(date -u -d "$(echo $FINAL | awk -F/ '{print $3"-"$2"-"$1}')" +%F)" >> "$GITHUB_OUTPUT"
          echo "Janela desta execução: $INICIAL a $FINAL"

      - name: 1a. Ingestão — convênios da janela
        env:
          PORTAL_TRANSPARENCIA_API_KEY: ${{ secrets.PORTAL_TRANSPARENCIA_API_KEY }}
          CONVENIOS_DATA_INICIAL: ${{ steps.janela.outputs.inicial }}
          CONVENIOS_DATA_FINAL: ${{ steps.janela.outputs.final }}
        run: python ingestion/extract_convenios.py

      - name: 1b. Ingestão — snapshot de emendas parlamentares
        env:
          PORTAL_TRANSPARENCIA_API_KEY: ${{ secrets.PORTAL_TRANSPARENCIA_API_KEY }}
        run: python ingestion/extract_emendas.py

      - name: 2a. Carga incremental — convênios da janela no Neon
        env:
          CARGA_JANELA_INICIO: ${{ steps.janela.outputs.inicial_iso }}
          CARGA_JANELA_FIM: ${{ steps.janela.outputs.final_iso }}
        run: python scripts/carregar_raw_postgres.py convenios

      - name: 2b. Carga snapshot — emendas no Neon
        run: python scripts/carregar_raw_postgres.py emendas

      - name: 3. Transformação — models e testes do dbt contra o Neon
        working-directory: transform
        run: |
          dbt run --profiles-dir . --target postgres
          dbt test --profiles-dir . --target postgres

      - name: 4. Publicação — gerar os JSON estáticos que o site consome
        run: python scripts/publicar_site.py

      - name: 5. Commitar os JSON atualizados
        run: |
          # Identidade padrão que o GitHub reserva pra commits de Actions.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data/

          # Janela sem novidade => JSONs idênticos => nada a commitar (evita
          # um commit vazio por dia só porque o workflow rodou).
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos dados — nada para commitar."
          else
            git commit -m "chore: atualiza dados (janela ${{ steps.janela.outputs.inicial }} a ${{ steps.janela.outputs.final }})"
            git push
          fi
